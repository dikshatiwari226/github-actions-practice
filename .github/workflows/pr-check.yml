---
name: PR Check Workflow
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - updated
jobs:
  pr-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        run: actions/checkout@v4

      - name: Print PR Branch
        run: echo "PR check running for branch: ${{ github.head_ref }}"
